<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
    <link rel="stylesheet" type="text/css" href="blog.css">
</head>
<body>

<div id="contactForm">
    <form onsubmit="return submitForm()">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your name..."><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Your email..."><br><br>

        <label for="phone">Phone (Optional):</label>
        <input type="tel" id="phone" name="phone" placeholder="Your phone..."><br><br>

        <label for="reason">Reason to contact Guna:</label>
        <textarea id="reason" name="reason" placeholder="Your message..."></textarea><br><br>

        <div class="button-container">
            <input type="submit" value="Submit">
            <button type="button" onclick="window.location.href='blog.html'">Back to Home</button>
        </div>
    </form>
</div>

<script>
    function submitForm() {
        alert("This is a non-responsive blog created by Guna as a sample. This function is not possible at this time. Please go back to the homepage.");
        return false;
    }
</script>

</body>
</html>
